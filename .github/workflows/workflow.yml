name: Test

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: Run

    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
        node: [20, 22, 24]
        exclude:
          - os: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        if: matrix.os == 'ubuntu-latest'
        run: pnpm run lint

      - name: test
        run: pnpm run test:headless

      - name: Package vscode plugin
        if: matrix.os == 'ubuntu-latest'
        run: pnpm run package && mv packages/vscode-lit-plugin/out/packaged.vsix vscode-lit-plugin.vsix

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        if: matrix.os == 'ubuntu-latest' && matrix.node == 24
        with:
          name: vscode-lit-plugin.vsix
          path: vscode-lit-plugin.vsix
